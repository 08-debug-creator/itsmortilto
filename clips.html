  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Roboto, Arial, sans-serif;
      background: rgb(30, 10, 44);
      padding: 20px;
      margin: 0;
      color: white;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: clamp(34px, 6vw, 60px);
      color: rgb(206, 206, 206);
    }

    .back-button {
      display: inline-block;
      margin-bottom: 30px;
      padding: 10px 20px;
      background-color: #9147ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .back-button:hover {
      background-color: #772ce8;
    }

    .clips-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .clip-card {
      background-color: rgb(45, 18, 61);
      border-radius: 18px;
      padding: 8px;
      transition: 0.3s ease;
    }

    .clip-card:hover {
      box-shadow: 5px 5px 9px rgba(212, 0, 255, 0.5);
      transform: translate(5px, 5px);
    }

    .thumbnail-row {
      position: relative;
      margin-bottom: 8px;
    }

    .thumbnail {
      width: 100%;
      display: block;
      border-radius: 14px;
    }

    .clip-time,
    .clip-views,
    .clip-posted-time {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 8px;
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      position: absolute;
      border-radius: 10px;
    }

    .clip-time {
      top: 8px;
      left: 8px;
    }

    .clip-views {
      bottom: 8px;
      left: 8px;
    }

    .clip-posted-time {
      bottom: 8px;
      right: 8px;
    }

    .clip-info-grid {
      display: grid;
      grid-template-columns: 50px 1fr;
      gap: 8px;
      align-items: start;
    }

    .profile-picture {
      width: 36px;
      height: 54px;
      object-fit: cover;
      border-radius: 8px;
      margin-left: 4px;
    }

    .clip-title {
      margin: 0 0 5px 0;
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      color: rgb(192, 192, 192);
    }

    .clip-author,
    .clip-stats {
      font-size: 12px;
      color: rgb(121, 121, 121);
      margin: 0 0 4px 0;
    }

    .clip-link {
      text-decoration: none;
      color: inherit;
    }
  </style>
